openapi: 3.0.3
info:
  title: Klarity API
  description: Unified REST API for Polymarket intelligence — markets, events, leaderboard, and AI-powered analytics.
  version: 2.0.0
servers:
  - url: https://api.klarity.trade
    description: Production
  - url: http://localhost:8080
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      tags:
        - Infrastructure
      description: Checks ClickHouse connectivity and returns service health status.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  database:
                    type: string
                  timestamp:
                    type: string
                required:
                  - status
                  - database
                  - timestamp
                additionalProperties: false
  /markets/recently-started:
    get:
      summary: Get recently started markets
      tags:
        - Markets
      description: Returns active markets sorted by creation date (newest first).
      parameters:
        - schema:
            default: 10
            type: integer
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
      responses:
        "200":
          description: Default Response
  /markets/ending-soon:
    get:
      summary: Get markets ending soon
      tags:
        - Markets
      description: Returns active markets sorted by end date (soonest first).
      parameters:
        - schema:
            default: 10
            type: integer
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
      responses:
        "200":
          description: Default Response
  /markets/{slug}/holders:
    get:
      summary: Get paginated holders for a market
      tags:
        - Markets
      description: Returns holder positions with classification (whale, smart money, insider), optional profile enrichment,
        and cursor-based pagination.
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: query
          name: limit
          required: false
        - schema:
            type: string
            pattern: ^\d+$
          in: query
          name: offset
          required: false
        - schema:
            type: string
          in: query
          name: cursor
          required: false
        - schema:
            type: string
            enum:
              - pnl
              - size
          in: query
          name: sortBy
          required: false
        - schema:
            type: string
            enum:
              - asc
              - desc
          in: query
          name: sortDirection
          required: false
        - schema:
            type: string
          in: query
          name: includeProfiles
          required: false
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        isPortfolioWhale:
                          type: boolean
                        isSmartMoney:
                          type: boolean
                        isInsider:
                          type: boolean
                        winRatePct:
                          nullable: true
                          type: number
                        totalRealizedPnlUsd:
                          nullable: true
                          type: number
                        closedPositions:
                          nullable: true
                          type: number
                        portfolioValueUsd:
                          nullable: true
                          type: number
                        ageHours:
                          nullable: true
                          type: number
                        address:
                          type: string
                        profile:
                          nullable: true
                          type: object
                          properties:
                            name:
                              nullable: true
                              type: string
                            pseudonym:
                              nullable: true
                              type: string
                            displayName:
                              nullable: true
                              type: string
                            profileImage:
                              nullable: true
                              type: string
                            xUsername:
                              nullable: true
                              type: string
                            verifiedBadge:
                              type: boolean
                            createdAt:
                              nullable: true
                              type: string
                          required:
                            - name
                            - pseudonym
                            - displayName
                            - profileImage
                            - xUsername
                            - verifiedBadge
                            - createdAt
                          additionalProperties: {}
                        remainingShares:
                          type: number
                        boughtShares:
                          nullable: true
                          type: number
                        soldShares:
                          nullable: true
                          type: number
                        avgEntryPriceUsd:
                          nullable: true
                          type: number
                        realizedPnlUsd:
                          nullable: true
                          type: number
                        tokenId:
                          nullable: true
                          type: string
                        priceUsd:
                          nullable: true
                          type: number
                        unrealizedPnlUsd:
                          nullable: true
                          type: number
                        remainingValueUsd:
                          nullable: true
                          type: number
                        marketsTradedCount:
                          nullable: true
                          type: number
                      required:
                        - isPortfolioWhale
                        - isSmartMoney
                        - isInsider
                        - winRatePct
                        - totalRealizedPnlUsd
                        - closedPositions
                        - portfolioValueUsd
                        - ageHours
                        - address
                        - profile
                        - remainingShares
                        - boughtShares
                        - soldShares
                        - avgEntryPriceUsd
                        - realizedPnlUsd
                        - tokenId
                        - priceUsd
                        - unrealizedPnlUsd
                        - remainingValueUsd
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      marketId:
                        type: string
                      slug:
                        type: string
                      count:
                        type: number
                      limit:
                        type: number
                      hasMore:
                        type: boolean
                      nextCursor:
                        nullable: true
                        type: string
                      eventTitle:
                        nullable: true
                        type: string
                      marketQuestion:
                        nullable: true
                        type: string
                      iconUrl:
                        nullable: true
                        type: string
                    required:
                      - marketId
                      - slug
                      - count
                      - limit
                      - hasMore
                      - nextCursor
                      - eventTitle
                      - marketQuestion
                      - iconUrl
                    additionalProperties: false
                required:
                  - data
                  - meta
                additionalProperties: false
  /markets/{slug}/whales:
    get:
      summary: Get portfolio whales for a market
      tags:
        - Markets
      description: Returns participants classified as portfolio whales (large portfolio value) for the given market.
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: query
          name: lookbackHours
          required: false
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        isPortfolioWhale:
                          type: boolean
                        isSmartMoney:
                          type: boolean
                        isInsider:
                          type: boolean
                        winRatePct:
                          nullable: true
                          type: number
                        totalRealizedPnlUsd:
                          nullable: true
                          type: number
                        closedPositions:
                          nullable: true
                          type: number
                        portfolioValueUsd:
                          nullable: true
                          type: number
                        ageHours:
                          nullable: true
                          type: number
                        address:
                          type: string
                        profile:
                          nullable: true
                          type: object
                          properties:
                            name:
                              nullable: true
                              type: string
                            pseudonym:
                              nullable: true
                              type: string
                            displayName:
                              nullable: true
                              type: string
                            profileImage:
                              nullable: true
                              type: string
                            xUsername:
                              nullable: true
                              type: string
                            verifiedBadge:
                              type: boolean
                            createdAt:
                              nullable: true
                              type: string
                          required:
                            - name
                            - pseudonym
                            - displayName
                            - profileImage
                            - xUsername
                            - verifiedBadge
                            - createdAt
                          additionalProperties: {}
                        shares:
                          type: number
                        positionValueUsd:
                          nullable: true
                          type: number
                        walletAgeHours:
                          nullable: true
                          type: number
                      required:
                        - isPortfolioWhale
                        - isSmartMoney
                        - isInsider
                        - winRatePct
                        - totalRealizedPnlUsd
                        - closedPositions
                        - portfolioValueUsd
                        - ageHours
                        - address
                        - profile
                        - shares
                        - positionValueUsd
                        - walletAgeHours
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      marketId:
                        type: string
                      slug:
                        type: string
                    required:
                      - marketId
                      - slug
                    additionalProperties: {}
                required:
                  - data
                  - meta
                additionalProperties: false
  /markets/{slug}/insiders:
    get:
      summary: Get insider-flagged participants for a market
      tags:
        - Markets
      description: Returns participants classified as insiders (new accounts with large early positions).
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        isPortfolioWhale:
                          type: boolean
                        isSmartMoney:
                          type: boolean
                        isInsider:
                          type: boolean
                        winRatePct:
                          nullable: true
                          type: number
                        totalRealizedPnlUsd:
                          nullable: true
                          type: number
                        closedPositions:
                          nullable: true
                          type: number
                        portfolioValueUsd:
                          nullable: true
                          type: number
                        ageHours:
                          nullable: true
                          type: number
                        address:
                          type: string
                        profile:
                          nullable: true
                          type: object
                          properties:
                            name:
                              nullable: true
                              type: string
                            pseudonym:
                              nullable: true
                              type: string
                            displayName:
                              nullable: true
                              type: string
                            profileImage:
                              nullable: true
                              type: string
                            xUsername:
                              nullable: true
                              type: string
                            verifiedBadge:
                              type: boolean
                            createdAt:
                              nullable: true
                              type: string
                          required:
                            - name
                            - pseudonym
                            - displayName
                            - profileImage
                            - xUsername
                            - verifiedBadge
                            - createdAt
                          additionalProperties: {}
                        shares:
                          type: number
                        positionValueUsd:
                          nullable: true
                          type: number
                        walletAgeHours:
                          nullable: true
                          type: number
                      required:
                        - isPortfolioWhale
                        - isSmartMoney
                        - isInsider
                        - winRatePct
                        - totalRealizedPnlUsd
                        - closedPositions
                        - portfolioValueUsd
                        - ageHours
                        - address
                        - profile
                        - shares
                        - positionValueUsd
                        - walletAgeHours
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      marketId:
                        type: string
                      slug:
                        type: string
                    required:
                      - marketId
                      - slug
                    additionalProperties: {}
                required:
                  - data
                  - meta
                additionalProperties: false
  /markets/{slug}/smartmoney:
    get:
      summary: Get smart money participants for a market
      tags:
        - Markets
      description: Returns participants classified as smart money (high win rate, high PnL, many closed positions).
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        isPortfolioWhale:
                          type: boolean
                        isSmartMoney:
                          type: boolean
                        isInsider:
                          type: boolean
                        winRatePct:
                          nullable: true
                          type: number
                        totalRealizedPnlUsd:
                          nullable: true
                          type: number
                        closedPositions:
                          nullable: true
                          type: number
                        portfolioValueUsd:
                          nullable: true
                          type: number
                        ageHours:
                          nullable: true
                          type: number
                        address:
                          type: string
                        profile:
                          nullable: true
                          type: object
                          properties:
                            name:
                              nullable: true
                              type: string
                            pseudonym:
                              nullable: true
                              type: string
                            displayName:
                              nullable: true
                              type: string
                            profileImage:
                              nullable: true
                              type: string
                            xUsername:
                              nullable: true
                              type: string
                            verifiedBadge:
                              type: boolean
                            createdAt:
                              nullable: true
                              type: string
                          required:
                            - name
                            - pseudonym
                            - displayName
                            - profileImage
                            - xUsername
                            - verifiedBadge
                            - createdAt
                          additionalProperties: {}
                        shares:
                          type: number
                        positionValueUsd:
                          nullable: true
                          type: number
                        walletAgeHours:
                          nullable: true
                          type: number
                      required:
                        - isPortfolioWhale
                        - isSmartMoney
                        - isInsider
                        - winRatePct
                        - totalRealizedPnlUsd
                        - closedPositions
                        - portfolioValueUsd
                        - ageHours
                        - address
                        - profile
                        - shares
                        - positionValueUsd
                        - walletAgeHours
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      marketId:
                        type: string
                      slug:
                        type: string
                    required:
                      - marketId
                      - slug
                    additionalProperties: {}
                required:
                  - data
                  - meta
                additionalProperties: false
  /markets/{slug}/analytics:
    get:
      summary: Get market analytics aggregate
      tags:
        - Markets
      description: Returns aggregated analytics including holder counts, PnL breakdown, and trader type distribution.
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  holders:
                    type: object
                    properties:
                      yes_holders:
                        type: number
                      no_holders:
                        type: number
                      total_holders:
                        type: number
                    required:
                      - yes_holders
                      - no_holders
                      - total_holders
                    additionalProperties: false
                  pnl:
                    type: object
                    properties:
                      yes_holders_total_pnl:
                        type: number
                      no_holders_total_pnl:
                        type: number
                      total_pnl:
                        type: number
                    required:
                      - yes_holders_total_pnl
                      - no_holders_total_pnl
                      - total_pnl
                    additionalProperties: false
                  trader_types:
                    type: object
                    properties:
                      yes:
                        type: object
                        properties:
                          insider_holders:
                            type: number
                          smart_money_holders:
                            type: number
                          whale_holders:
                            type: number
                        required:
                          - insider_holders
                          - smart_money_holders
                          - whale_holders
                        additionalProperties: false
                      no:
                        type: object
                        properties:
                          insider_holders:
                            type: number
                          smart_money_holders:
                            type: number
                          whale_holders:
                            type: number
                        required:
                          - insider_holders
                          - smart_money_holders
                          - whale_holders
                        additionalProperties: false
                    required:
                      - yes
                      - no
                    additionalProperties: false
                  meta:
                    type: object
                    properties:
                      marketId:
                        type: string
                      slug:
                        type: string
                    required:
                      - marketId
                      - slug
                    additionalProperties: false
                required:
                  - holders
                  - pnl
                  - trader_types
                  - meta
                additionalProperties: false
  /markets/{slug}/trades:
    get:
      summary: Get recent trades for a market
      tags:
        - Markets
      description: Returns paginated trades with trader classification enrichment and optional profile data.
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: query
          name: limit
          required: false
          description: Maximum trades to return (1-100, default 25)
        - schema:
            type: string
            pattern: ^\d+$
          in: query
          name: offset
          required: false
          description: Offset for pagination
        - schema:
            type: string
          in: query
          name: includeProfiles
          required: false
          description: Include Polymarket profile data
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        isPortfolioWhale:
                          type: boolean
                        isSmartMoney:
                          type: boolean
                        isInsider:
                          type: boolean
                        winRatePct:
                          nullable: true
                          type: number
                        totalRealizedPnlUsd:
                          nullable: true
                          type: number
                        closedPositions:
                          nullable: true
                          type: number
                        portfolioValueUsd:
                          nullable: true
                          type: number
                        ageHours:
                          nullable: true
                          type: number
                        id:
                          type: string
                        address:
                          type: string
                        profile:
                          nullable: true
                          type: object
                          properties:
                            name:
                              nullable: true
                              type: string
                            pseudonym:
                              nullable: true
                              type: string
                            displayName:
                              nullable: true
                              type: string
                            profileImage:
                              nullable: true
                              type: string
                            xUsername:
                              nullable: true
                              type: string
                            verifiedBadge:
                              type: boolean
                            createdAt:
                              nullable: true
                              type: string
                          required:
                            - name
                            - pseudonym
                            - displayName
                            - profileImage
                            - xUsername
                            - verifiedBadge
                            - createdAt
                          additionalProperties: {}
                        priceUsd:
                          type: number
                        shares:
                          type: number
                        valueUsd:
                          type: number
                        timestamp:
                          type: string
                        conditionId:
                          type: string
                        marketSlug:
                          nullable: true
                          type: string
                        eventTitle:
                          nullable: true
                          type: string
                        marketQuestion:
                          nullable: true
                          type: string
                        outcomeTitle:
                          nullable: true
                          type: string
                        iconUrl:
                          nullable: true
                          type: string
                      required:
                        - isPortfolioWhale
                        - isSmartMoney
                        - isInsider
                        - winRatePct
                        - totalRealizedPnlUsd
                        - closedPositions
                        - portfolioValueUsd
                        - ageHours
                        - id
                        - address
                        - profile
                        - priceUsd
                        - shares
                        - valueUsd
                        - timestamp
                        - conditionId
                        - marketSlug
                        - eventTitle
                        - marketQuestion
                        - outcomeTitle
                        - iconUrl
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      marketId:
                        type: string
                      slug:
                        nullable: true
                        type: string
                      limit:
                        type: number
                      offset:
                        type: number
                      hasMore:
                        type: boolean
                    required:
                      - marketId
                      - slug
                      - limit
                      - offset
                      - hasMore
                    additionalProperties: false
                required:
                  - data
                  - meta
                additionalProperties: false
  /markets/discover:
    post:
      summary: Discover markets with filters, deltas, and cursor pagination
      tags:
        - Markets
      description: Query the pre-computed discovery serving table with metric filters, delta calculations, tag filters, and
        cursor-based pagination. Use explain=true in non-production for SQL debugging.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metrics:
                  type: array
                  items:
                    type: string
                    enum:
                      - volume
                      - liquidity
                      - holders_total
                      - holders_yes
                      - holders_no
                      - holders_whale
                      - holders_smart_money
                      - holders_insider
                      - price
                deltas:
                  type: array
                  items:
                    type: object
                    properties:
                      metric:
                        type: string
                        enum:
                          - volume
                          - liquidity
                          - holders_total
                          - holders_yes
                          - holders_no
                          - holders_whale
                          - holders_smart_money
                          - holders_insider
                          - price
                      window:
                        type: string
                        enum:
                          - 5m
                          - 15m
                          - 30m
                          - 1h
                          - 4h
                          - 24h
                          - 7d
                          - 30d
                      since:
                        type: string
                        format: date-time
                        pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      compare:
                        type: string
                        enum:
                          - delta_abs
                          - delta_pct
                    required:
                      - metric
                      - compare
                filters:
                  allOf:
                    - $ref: "#/components/schemas/schema0Input"
                sort:
                  anyOf:
                    - type: object
                      properties:
                        metric:
                          type: string
                          enum:
                            - volume
                            - liquidity
                            - holders_total
                            - holders_yes
                            - holders_no
                            - holders_whale
                            - holders_smart_money
                            - holders_insider
                            - price
                            - end_date
                            - created_at
                        direction:
                          default: desc
                          type: string
                          enum:
                            - asc
                            - desc
                        window:
                          type: string
                          enum:
                            - 5m
                            - 15m
                            - 30m
                            - 1h
                            - 4h
                            - 24h
                            - 7d
                            - 30d
                        compare:
                          type: string
                          enum:
                            - delta_abs
                            - delta_pct
                      required:
                        - metric
                    - type: object
                      properties:
                        primary:
                          type: object
                          properties:
                            metric:
                              type: string
                              enum:
                                - volume
                                - liquidity
                                - holders_total
                                - holders_yes
                                - holders_no
                                - holders_whale
                                - holders_smart_money
                                - holders_insider
                                - price
                                - end_date
                                - created_at
                            direction:
                              default: desc
                              type: string
                              enum:
                                - asc
                                - desc
                            window:
                              type: string
                              enum:
                                - 5m
                                - 15m
                                - 30m
                                - 1h
                                - 4h
                                - 24h
                                - 7d
                                - 30d
                            compare:
                              type: string
                              enum:
                                - delta_abs
                                - delta_pct
                          required:
                            - metric
                        fallback:
                          type: object
                          properties:
                            metric:
                              type: string
                              enum:
                                - volume
                                - liquidity
                                - holders_total
                                - holders_yes
                                - holders_no
                                - holders_whale
                                - holders_smart_money
                                - holders_insider
                                - price
                                - end_date
                                - created_at
                            direction:
                              default: desc
                              type: string
                              enum:
                                - asc
                                - desc
                            window:
                              type: string
                              enum:
                                - 5m
                                - 15m
                                - 30m
                                - 1h
                                - 4h
                                - 24h
                                - 7d
                                - 30d
                            compare:
                              type: string
                              enum:
                                - delta_abs
                                - delta_pct
                          required:
                            - metric
                      required:
                        - primary
                pagination:
                  type: object
                  properties:
                    cursor:
                      type: string
                    limit:
                      default: 20
                      type: number
                      minimum: 1
                      maximum: 100
                options:
                  type: object
                  properties:
                    minVolume:
                      default: 0
                      type: number
                      minimum: 0
                    search:
                      type: string
                      maxLength: 200
                    createdAfter:
                      type: string
                      format: date-time
