        Calmar, max drawdown, Kelly criterion, etc.). Supports sorting by any metric, filtering, and cursor-based
        pagination.
      parameters:
        - schema:
            default: 100
            type: integer
            minimum: 1
            maximum: 1000
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
        - schema:
            type: string
          in: query
          name: cursor
          required: false
        - schema:
            default: pnl
            type: string
            enum:
              - pnl
              - total_pnl
              - overall_pnl
              - realized_pnl
              - win_rate
              - winRate
              - total_wins
              - totalWins
              - total_losses
              - totalLosses
              - current_value
              - currentValue
              - active_positions
              - activePositions
              - total_closed_positions
              - totalClosedPositions
              - volume
              - total_volume
              - totalVolume
              - position_count
              - positionCount
              - sharpe_ratio
              - sharpeRatio
              - sharpe
              - sortino_ratio
              - sortinoRatio
              - sortino
              - calmar_ratio
              - calmarRatio
              - calmar
              - max_drawdown
              - maxDrawdown
              - roi
              - smart_score
              - smartScore
              - score
              - confidence_score
              - confidenceScore
              - win_rate_weighted
              - winRateWeighted
          in: query
          name: sortBy
          required: false
          description: Sort field. pnl/total_pnl = total PnL, realized_pnl = realized only
        - schema:
            default: DESC
            type: string
            enum:
              - ASC
              - DESC
          in: query
          name: sortOrder
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - "true"
              - type: string
                enum:
                  - "false"
              - type: boolean
          in: query
          name: advanced
          required: false
        - schema:
            type: number
          in: query
          name: minVolume
          required: false
        - schema:
            type: number
          in: query
          name: maxVolume
          required: false
        - schema:
            type: number
          in: query
          name: minPnl
          required: false
        - schema:
            type: number
          in: query
          name: maxPnl
          required: false
        - schema:
            type: number
          in: query
          name: minSmartScore
          required: false
        - schema:
            type: number
          in: query
          name: maxSmartScore
          required: false
        - schema:
            type: number
          in: query
          name: minWinRate
          required: false
        - schema:
            type: number
          in: query
          name: maxWinRate
          required: false
        - schema:
            type: integer
            minimum: -9007199254740991
            maximum: 9007199254740991
          in: query
          name: minPositions
          required: false
        - schema:
            type: integer
            minimum: -9007199254740991
            maximum: 9007199254740991
          in: query
          name: maxPositions
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - "true"
              - type: string
                enum:
                  - "false"
              - type: boolean
