  /markets/{slug}/volume-profile:
    get:
      summary: Get volume profile for a market
      tags:
        - Markets
      description: Returns hourly volume buckets showing when trading activity occurred throughout market lifetime.
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: slug
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        hour:
                          type: string
                        volumeUsd:
                          type: number
                        tradeCount:
                          type: number
                        buyVolumeUsd:
                          type: number
                        sellVolumeUsd:
                          type: number
                        uniqueTraders:
                          type: number
                      required:
                        - hour
                        - volumeUsd
                        - tradeCount
                        - buyVolumeUsd
                        - sellVolumeUsd
                        - uniqueTraders
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      conditionId:
                        type: string
                      slug:
                        type: string
                      totalVolumeUsd:
                        type: number
                      totalTrades:
                        type: number
                      firstTradeAt:
                        nullable: true
                        type: string
                      lastTradeAt:
                        nullable: true
                        type: string
                    required:
                      - conditionId
                      - slug
                      - totalVolumeUsd
                      - totalTrades
                      - firstTradeAt
                      - lastTradeAt
                    additionalProperties: false
                required:
                  - data
                  - meta
                additionalProperties: false
