components:
  schemas:
    schema0Input:
      type: object
      description: Compound filter group — combine conditions with AND/OR logic; groups may nest to express complex queries.
      properties:
        logic:
          type: string
          enum:
            - and
            - or
          default: and
        conditions:
          type: array
          description: Filter conditions, or nested filter groups.
          items:
            oneOf:
              - type: object
                description: A single filter condition on a metric.
                properties:
                  metric:
                    type: string
                  window:
                    type: string
                    enum:
                      - 5m
                      - 15m
                      - 30m
                      - 1h
                      - 4h
                      - 24h
                      - 7d
                      - 30d
                  compare:
                    type: string
                    enum:
                      - delta_abs
                      - delta_pct
                  operator:
                    type: string
                    enum:
                      - gt
                      - gte
                      - lt
                      - lte
                      - eq
                  value:
                    type: number
                required:
                  - metric
                  - operator
                  - value
              - $ref: "#/components/schemas/schema0Input"
